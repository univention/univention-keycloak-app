---
variables:
  # version
  PACKAGE_REGISTRY: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/keycloak-tar"
  # Documentation build uses this variable to set the release version of the document
  KEYCLOAK_VERSION: "26.6.3"
  # this is where we get keycloak from
  KEYCLOAK_SOURCE: "https://github.com/keycloak/keycloak/releases/download/$KEYCLOAK_VERSION/keycloak-$KEYCLOAK_VERSION.tar.gz"
  # this is where we keycloak store and use from during the image build
  KEYCLOAK_DIST: "${PACKAGE_REGISTRY}/$KEYCLOAK_VERSION/keycloak-$KEYCLOAK_VERSION.tar.gz"
  # Documentation build uses this variable to determine the artifact output directory.
  DOC_TARGET_VERSION: "26.x"
  # UCS version used for the aptly pre-release version suffix on feature branches.
  # Bump this when starting a new UCS release branch.
  UCS_VERSION: "5.2-5"
  RENOVATE_USER_ID: "1393"
  # Opt in to common-ci's release-tag pipeline (protected-vX.Y.Z rule in
  # nubus-workflow, gated on this).
  TAGGED_RELEASE: "true"

include:
  - project: "univention/dev/nubus-for-k8s/common-ci"
    ref: "v1.64.0"
    file:
      - "defaults/stages.yaml"
      - "defaults/nubus-workflow.yaml"
      - "jobs/lint-pre-commit.yaml"
      - "jobs/lint-commit-messages.yaml"
      # Release only from a protected vX.Y.Z tag (tagged-release) instead of
      # auto-releasing from main via semantic-release. The opt-in workflow rule
      # lives in nubus-workflow, enabled by TAGGED_RELEASE below.
      - "templates/tagged-release.yaml"
      - "jobs/container-build-external.yaml"
      - "jobs/package-and-publish-helm-charts-external.yaml"
      - "templates/sonarqube.yaml"

  - project: "univention/infrastructure/docker-services"
    ref: "master"
    file:
      - "dind.yml"

  - component: "$CI_SERVER_FQDN/univention/dev/tooling/ci-components/debian-aptly@2.5.2"
    inputs:
      pkg-dir: univention-keycloak
  - component: "$CI_SERVER_FQDN/univention/dev/tooling/ci-components/debian-errata-build@2.5.2"
    inputs:
      debian-package: univention-keycloak
      pkg-dir: univention-keycloak

  # App Center release: create_app_version / update_appcenter / do_release etc.
  # On a feature branch (MR) creating the version is manual (see the
  # create_app_version override below); on a protected vX.Y.Z tag it is the real
  # release. The App Center Version comes from the tag (templated into ini.jinja).
  - component: "$CI_SERVER_FQDN/univention/dev/tooling/ci-components/app-release@2.5.2"
    inputs:
      app_id: "keycloak"
      ucs_base_version: "5.0"
      changelog_link: "https://docs.software-univention.de/keycloak-app/latest/"
      mail_recipient: "app-announcement@univention.de"
      mail_sender: "nubus-core@univention.de"
      author_alias: "Nubus Core Team"
      chat_destination: "#keycloak"
      appcenter_file_dir: "appcenter/"
      release_tag_prefix: "v"
      build_stage: "package"
      release_stage: "publish"
      cleanup_stage: ".post"
      additional_update_appcenter_needs:
        - job: "container-build"
          parallel:
            matrix:
              - IMAGE_NAME: "keycloak"
                DOCKERFILE_PATH: "docker/keycloak/Dockerfile"
                KANIKO_BUILD_CONTEXT: "./"
                KANIKO_ARGS: "--cache=true --cache-repo=$CI_REGISTRY_IMAGE/cache --build-arg KEYCLOAK_VERSION=$KEYCLOAK_VERSION --build-arg KEYCLOAK_DIST=$KEYCLOAK_DIST"
          optional: true
        # So update_appcenter inherits RELEASE_VERSION + PUBLIC_RELEASE (dotenv),
        # used by compose.jinja to point at the published nubus/nubus-dev image.
        - pre-semantic-release

  - local: /.gitlab-ci/gitlab-ci.yml

# Version stamp via common-ci's .tagged-release template. Releases come only from
# a protected vX.Y.Z tag; every other ref is a "<base>-post-<slug>" dev build
# published to nubus-dev only. Job name kept as "pre-semantic-release" because
# container-release-attestation depends on it for RELEASE_VERSION.
# INITIAL_VERSION floors the base at the current Keycloak app version so the next
# release tag (v26.6.2) does not regress below the App Center's 26.6.1-ucs1.
pre-semantic-release:
  extends: .tagged-release
  variables:
    INITIAL_VERSION: "26.6.1"

.build-matrix: &build-matrix
  - IMAGE_NAME: "keycloak"
    DOCKERFILE_PATH: "docker/keycloak/Dockerfile"
    KANIKO_BUILD_CONTEXT: "./"
    KANIKO_ARGS: "--cache=true --cache-repo=$CI_REGISTRY_IMAGE/cache --build-arg KEYCLOAK_VERSION=$KEYCLOAK_VERSION --build-arg KEYCLOAK_DIST=$KEYCLOAK_DIST"
  - IMAGE_NAME: "keycloak-bootstrap"
    DOCKERFILE_PATH: "docker/keycloak-bootstrap/Dockerfile"
    KANIKO_BUILD_CONTEXT: "./"
    KANIKO_ARGS: "--cache=false"

container-build:
  parallel:
    matrix: *build-matrix
  rules: &container-rules
    # Build/sign/push the images on a release tag so the tagged-release pipeline
    # has them to publish (to nubus) and reference in the App Center version.
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$IMAGE_NAME == "keycloak" || $IMAGE_NAME == "keycloak-bootstrap"'
      changes: &software-changes
        - appcenter/**/*
        - dependencies/**/*
        - docs-dev/**/*
        - extensions/**/*
        - files/**/*
        - originals/**/*
        - scripts/**/*
        - Dockerfile
        - docker-compose.yaml
        - pyproject.toml
        - renovate.json
        - requirements.txt
        - sonar-project.properties
        - docker/keycloak-bootstrap/**/*
        - univention-keycloak/**/*
    - if: '$IMAGE_NAME != "keycloak" && $IMAGE_NAME != "keycloak-bootstrap"'

container-malware-scan:
  parallel:
    matrix: *build-matrix

container-sign-external:
  parallel:
    matrix: *build-matrix
  rules: *container-rules

push-image-external:
  parallel:
    matrix: *build-matrix
  rules: *container-rules

container-release-attestation:
  needs:
    - job: push-image-external
      optional: true
    - job: pre-semantic-release
  parallel:
    matrix: *build-matrix
  rules: *container-rules
  needs:
    - job: push-image-external
      optional: true
    - job: pre-semantic-release

test-udm-unit-and-integration:
  needs: []
  stage: test
  extends: .dind
  image: "${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/docker:29.0.2"
  rules: &rules_dind
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: "never"
    - if: '$GITLAB_USER_ID == $RENOVATE_USER_ID && $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_LABELS !~ /Renovate run dind/'
      when: "manual"
    - changes: *software-changes
      when: "on_success"
  before_script:
    - cd extensions/tests
    # Allow that the Docker API version is negotiated between client and server
    - unset DOCKER_API_VERSION
    - export IMAGE_TAG=${RELEASE_VERSION}
    - echo -e "\e[0Ksection_start:`date +%s`:docker_debug[collapsed=true]\r\e[0KDocker version details"
    - echo $IMAGE_TAG
    - docker version
    - echo -e "\e[0Ksection_end:`date +%s`:docker_debug\r\e[0K"
    - echo -e "\e[0Ksection_start:`date +%s`:docker_compose_config[collapsed=true]\r\e[0KDocker Compose configuration"
    - docker compose config test
    - echo -e "\e[0Ksection_end:`date +%s`:docker_compose_config\r\e[0K"
    - docker compose up --no-build --quiet-pull --wait --wait-timeout 60 ldap-server udm-rest-api
  script:
    - docker compose run --quiet-pull test
  after_script:
    - docker logs ldap-server >& ldap-server.log
    - docker logs udm-rest-api >& udm-rest-api.log
    - docker compose down --volumes
  artifacts:
    paths:
      - ldap-server.log
      - udm-rest-api.log
    expire_in: "1 day"
    when: "always"
    expose_as: "docker compose server logs"

sonarqube:
  extends: .sonarqube
  needs: []

chart-tests:
  image: "gitregistry.knut.univention.de/univention/dev/nubus-for-k8s/common-helm/testrunner:0.29.0"
  stage: "test"
  needs: []
  script:
    - "helm dep build helm/keycloak"
    - "helm dep build helm/keycloak-bootstrap"
    - "pytest -vv helm-unittests"

# Feature branches: creating the App Center version is MANUAL (one click on
# create_app_version; update_appcenter follows automatically as it needs it).
# On a vX.Y.Z tag it is automatic (the release); on main it refreshes staging.
# Rules mirror the app-release component, with the MR case set to manual (and the
# per-rule ENVIRONMENT_NAME kept so the environment/on_stop still resolve).
create_app_version:
  # Auto-expire the per-MR test version after 3 days (merges with the component's
  # environment name/url/on_stop). GitLab then stops the environment, triggering
  # delete_app_version to remove the temporary App Center version even if the MR
  # is still open. The component has no input for this, so we set it here.
  environment:
    auto_stop_in: "3 days"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'
      variables:
        ENVIRONMENT_NAME: "release-app/${APP_ID}_$CI_COMMIT_TAG"
    - if: '$CI_MERGE_REQUEST_ID'
      when: "manual"
      variables:
        ENVIRONMENT_NAME: "branch-app/${APP_ID}_$CI_COMMIT_REF_SLUG"
    - if: '$CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH'
      variables:
        ENVIRONMENT_NAME: "staging-app/${APP_ID}_999.0.0-staging"
